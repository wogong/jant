{{ define "main" }}
  <article class="page">
    {{- with .Title -}}
      <header class="page-header">
        <h1 class="page-title">{{ . }}</h1>
      </header>
    {{- end -}}
    {{- with .Params.summary_text -}}
      <p class="page-summary">{{ . }}</p>
    {{- end -}}
    <div class="page-body">
      {{ .Content }}
    </div>
  </article>
{{ end }}
